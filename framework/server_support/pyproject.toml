[project]
name = "server_support"
version = "0.11.0"
description = "Auto-generated FastAPI HTTP server for machine-core"
requires-python = ">=3.12"
dependencies = ["fastapi>=0.100.0", "sse-starlette>=1.6.0", "uvicorn[standard]>=0.20.0", "loguru>=0.7.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["server_support"]
