[project]
name = "server_support"
version = "0.11.0"
description = "Auto-generated FastAPI HTTP server for machine-core"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.100.0", 
    "sse-starlette>=1.6.0", 
    "uvicorn[standard]>=0.20.0", 
    "loguru>=0.7.0",
    "machine_core",
    "agent_support",
    "tool_support",
    "model_provider_support",
    "vectorstore_support",
    "voice_support",
    "agent_runtime_pydantic",
    "agent_runtime_basic",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["server_support"]

[tool.hatch.build.targets.wheel.force-include]
"manifest.json" = "server_support/manifest.json"


[tool.uv.sources]
machine_core = { git = "git+ssh://git@github.com/samletnorge/machine-core.git" }
agent_support = { git = "git+ssh://git@github.com/samletnorge/machine-plugins.git", subdirectory = "framework/agent_support" }
tool_support = { git = "git+ssh://git@github.com/samletnorge/machine-plugins.git", subdirectory = "framework/tool_support" }
model_provider_support = { git = "git+ssh://git@github.com/samletnorge/machine-plugins.git", subdirectory = "framework/model_provider_support" }
vectorstore_support = { git = "git+ssh://git@github.com/samletnorge/machine-plugins.git", subdirectory = "framework/vectorstore_support" }
voice_support = { git = "git+ssh://git@github.com/samletnorge/machine-plugins.git", subdirectory = "framework/voice_support" }
agent_runtime_pydantic = { git = "git+ssh://git@github.com/samletnorge/machine-plugins.git", subdirectory = "community/agent_runtime_pydantic" }
agent_runtime_basic = { git = "git+ssh://git@github.com/samletnorge/machine-plugins.git", subdirectory = "community/agent_runtime_basic" }