[project]
name = "machine-core-studio-support"
version = "0.1.0"
description = "Visual studio/playground for machine-core"
requires-python = ">=3.12"
dependencies = ["jinja2>=3.1.0", "python-multipart>=0.0.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["machine_studio"]

[tool.hatch.build.targets.wheel.force-include]
"manifest.json" = "studio_support/manifest.json"
