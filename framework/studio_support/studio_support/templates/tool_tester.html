{% extends "base.html" %}
{% block content %}
<section class="content-grid two-up">
    <article class="panel">
        <div class="panel-header">
            <div>
                <span class="eyebrow">Tool</span>
                <h3>{{ tool_name }}</h3>
            </div>
        </div>
        <p>{{ tool.description or tool.__doc__ or "No tool description available." }}</p>
        <form id="tool-form" class="tool-form">
            <textarea id="tool-input" class="control-textarea" placeholder='{"input": "value"}'></textarea>
            <button type="submit" class="primary-button">Execute</button>
        </form>
    </article>

    <article class="panel">
        <div class="panel-header">
            <div>
                <span class="eyebrow">Result</span>
                <h3>Output</h3>
            </div>
        </div>
        <pre id="tool-result" class="code-panel min"></pre>
    </article>
</section>
<script>
    document.getElementById('tool-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('tool-input').value;
        let body;
        try { body = JSON.parse(input); } catch { body = {input: input}; }
        const resp = await fetch('{{ request.scope.root_path }}/tools/{{ tool_name }}/execute', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
        });
        const data = await resp.json();
        document.getElementById('tool-result').textContent = JSON.stringify(data, null, 2);
    });
</script>
{% endblock %}
