{% extends "base.html" %}
{% block content %}
<section class="panel">
    <div class="panel-header">
        <div>
            <span class="eyebrow">Reserved surface</span>
            <h3>{{ section_title }}</h3>
        </div>
        <span class="pill">{{ active_nav }}</span>
    </div>
    <p>{{ section_description }}</p>
    {% if account_page %}
    <div class="account-panel">
        <label class="theme-select account-theme-select">
            <span>Theme</span>
            <select id="theme-picker">
                {% for key, theme in themes.items() %}
                <option value="{{ key }}">{{ theme.label }}</option>
                {% endfor %}
            </select>
        </label>
    </div>
    {% endif %}
    <pre class="code-panel">{{ {"implemented": false, "next": active_nav} | tojson(indent=2) }}</pre>
</section>
{% endblock %}
