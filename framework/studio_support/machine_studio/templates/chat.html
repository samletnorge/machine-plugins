{% extends "base.html" %}
{% block title %}Chat — Studio{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Agent Chat</h1>
<div class="max-w-2xl">
    <select id="agent-select" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 mb-4 w-full">
        {% for a in agents %}
        <option value="{{ a }}" {% if a == selected_agent %}selected{% endif %}>{{ a }}</option>
        {% endfor %}
    </select>
    <div id="chat-messages" class="mb-4 min-h-[200px]">
        {% for msg in messages %}
        <div class="p-2 mb-2 bg-gray-800 rounded">{{ msg }}</div>
        {% endfor %}
    </div>
    <form hx-post="/chat/send" hx-target="#chat-messages" hx-swap="beforeend" class="flex gap-2">
        <input type="hidden" name="agent" id="agent-input" value="{{ selected_agent }}">
        <input type="text" name="message" placeholder="Type a message..." class="flex-1 bg-gray-800 border border-gray-700 rounded px-3 py-2" required>
        <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded">Send</button>
    </form>
</div>
<script>
    document.getElementById('agent-select').addEventListener('change', function() {
        document.getElementById('agent-input').value = this.value;
    });
</script>
{% endblock %}
