{% extends "base.html" %}
{% block title %}{{ tool.name }} — Tool Tester{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Tool: {{ tool.name }}</h1>
<p class="text-gray-400 mb-4">{{ tool.description }}</p>
<div class="max-w-2xl">
    <div id="tool-result" class="mb-4 p-4 bg-gray-900 rounded min-h-[100px]"></div>
    <form id="tool-form" class="flex gap-2">
        <input type="text" id="tool-input" placeholder='{"input": "value"}' class="flex-1 bg-gray-800 border border-gray-700 rounded px-3 py-2">
        <button type="submit" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded">Execute</button>
    </form>
</div>
<script>
    document.getElementById('tool-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('tool-input').value;
        let body;
        try { body = JSON.parse(input); } catch { body = {input: input}; }
        const resp = await fetch('/tools/{{ tool.name }}/execute', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
        });
        const data = await resp.json();
        document.getElementById('tool-result').textContent = JSON.stringify(data, null, 2);
    });
</script>
{% endblock %}
