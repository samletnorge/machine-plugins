<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Machine Studio{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="/static/studio.css">
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <nav class="bg-gray-900 border-b border-gray-800 px-6 py-3">
        <div class="flex items-center justify-between">
            <a href="/" class="text-xl font-bold">⚡ Machine Studio</a>
            <div class="flex gap-4">
                <a href="/" class="hover:text-blue-400">Home</a>
                <a href="/chat" class="hover:text-blue-400">Chat</a>
            </div>
        </div>
    </nav>
    <main class="p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
