[project]
name = "machine-core-voice-support"
version = "0.5.0"
description = "Defines the voice category for TTS/STT providers"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
openai = ["openai>=1.0.0", "websockets>=12.0"]
whisper = ["openai-whisper>=20231117"]
edge-tts = ["edge-tts>=6.1.0"]
gtts = ["gTTS>=2.4.0"]
elevenlabs = ["elevenlabs>=1.0.0"]
deepgram = ["deepgram-sdk>=3.0.0"]
google-cloud = ["google-cloud-texttospeech>=2.16.0", "google-cloud-speech>=2.24.0"]
azure = ["azure-cognitiveservices-speech>=1.35.0"]
fish-audio = ["httpx>=0.27.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
