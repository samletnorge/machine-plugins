[project]
name = "vectorstore_support"
version = "0.5.0"
description = "Defines the vector_store category for machine-core"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vectorstore_support"]

[tool.hatch.build.targets.wheel.force-include]
"manifest.json" = "vectorstore_support/manifest.json"
