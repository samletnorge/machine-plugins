[project]
name = "workflow_support"
version = "0.9.0"
description = "Defines the workflow and execution-engine categories for machine-core"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["workflow_support"]

[tool.hatch.build.targets.wheel.force-include]
"manifest.json" = "workflow_support/manifest.json"
