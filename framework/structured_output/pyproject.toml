[project]
name = "structured_output"
version = "0.5.0"
description = "Defines the structured_output category for typed outputs"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["machine_structured_output"]

[tool.hatch.build.targets.wheel.force-include]
"manifest.json" = "structured_output/manifest.json"
